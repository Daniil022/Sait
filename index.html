<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
    <title>Тест на беременность по симптомам | Онлайн проверка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #fef7f2 0%, #fde9e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(18px);
            background: #ffffff;
            border-radius: 44px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.08), 0 12px 25px rgba(200, 120, 100, 0.15);
            padding: 2.2rem 2rem 2.5rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 220, 200, 0.7);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #4a3b38;
            text-align: center;
            margin-bottom: 0.3rem;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        h1 span {
            background: #ffe6e0;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #b15a4a;
        }

        .subhead {
            text-align: center;
            color: #7f6b64;
            font-size: 1rem;
            margin-bottom: 2rem;
            font-weight: 400;
            border-bottom: 1px dashed #eed5cc;
            padding-bottom: 1.2rem;
        }

        .symptoms-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.8rem 0 1.8rem;
        }

        .symptom-item {
            display: flex;
            align-items: center;
            background: #fdf7f4;
            border-radius: 24px;
            padding: 0.9rem 1.3rem;
            transition: background 0.2s, box-shadow 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }
        .symptom-item:hover {
            background: #fff5f0;
            border-color: #fbc9bb;
            box-shadow: 0 6px 14px rgba(230, 150, 120, 0.1);
        }

        .symptom-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #e07b6b;
            transform: scale(1);
            margin-right: 1rem;
            flex-shrink: 0;
            border-radius: 6px;
            cursor: pointer;
        }

        .symptom-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: #3e312c;
            flex: 1;
            line-height: 1.4;
        }

        .symptom-emoji {
            font-size: 1.5rem;
            margin-right: 0.6rem;
            width: 2rem;
            display: inline-block;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 2.2rem 0 1.6rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 130px;
            background: white;
            border: none;
            padding: 1rem 1.2rem;
            border-radius: 34px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            background: #f3edea;
            color: #4a3b38;
            box-shadow: 0 5px 10px rgba(0,0,0,0.03);
            border: 1px solid #e7d9d2;
        }

        .btn-primary {
            background: #e28674;
            color: white;
            border: 1px solid #d9705c;
            box-shadow: 0 8px 18px rgba(210, 100, 70, 0.25);
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #d97460;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(160, 100, 80, 0.18);
        }

        .result-box {
            margin-top: 1.8rem;
            padding: 1.4rem 1.6rem;
            border-radius: 28px;
            background: #faf7f4;
            border: 1px solid #eddcd3;
            transition: all 0.3s ease;
            font-weight: 500;
            color: #3b2f2a;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            line-height: 1.5;
        }

        .result-highlight {
            background: #ffffff;
            border-left: 6px solid #e28674;
            box-shadow: 0 10px 22px rgba(190, 120, 100, 0.15);
            font-weight: 500;
        }

        .probability-badge {
            background: #f2ddd5;
            border-radius: 30px;
            padding: 0.3rem 1.2rem;
            font-weight: 600;
            color: #a64b3a;
            margin-left: 0.5rem;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .disclaimer {
            font-size: 0.8rem;
            color: #9b8a82;
            margin-top: 1.8rem;
            text-align: center;
            border-top: 1px solid #f0e2da;
            padding-top: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        .reset-icon {
            font-size: 1.2rem;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.8rem 1.4rem;
                border-radius: 34px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .symptom-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            🤰 Тест на беременность
            <span>по симптомам</span>
        </h1>
        <div class="subhead">
            Отметьте признаки, которые вы заметили в последнее время
        </div>

        <div class="symptoms-grid" id="symptomsContainer">
            <!-- Симптомы добавляются через JS для чистоты, но можно и статично -->
        </div>

        <div class="action-buttons">
            <button class="btn" id="resetBtn">
                <span class="reset-icon">↺</span> Сбросить
            </button>
            <button class="btn btn-primary" id="calculateBtn">
                🔍 Рассчитать вероятность
            </button>
        </div>

        <div id="resultPanel" class="result-box">
            <span>✨</span> Выберите симптомы и нажмите «Рассчитать»
        </div>

        <div class="disclaimer">
            ⚕️ Это не медицинский диагноз. При подозрении на беременность сделайте тест или обратитесь к врачу.
        </div>
    </div>

    <script>
        (function() {
            // Список симптомов с ключами, текстом и эмодзи
            const symptomsList = [
                { id: 'missedPeriod', text: 'Задержка менструации', emoji: '📅' },
                { id: 'nausea', text: 'Тошнота / утреннее недомогание', emoji: '🤢' },
                { id: 'breastTenderness', text: 'Чувствительность груди', emoji: '🌸' },
                { id: 'fatigue', text: 'Сильная усталость, сонливость', emoji: '😴' },
                { id: 'frequentUrination', text: 'Частое мочеиспускание', emoji: '🚽' },
                { id: 'foodAversions', text: 'Отвращение к запахам / еде', emoji: '👃' },
                { id: 'moodSwings', text: 'Перепады настроения', emoji: '🎭' },
                { id: 'bloating', text: 'Вздутие живота', emoji: '🫃' },
                { id: 'spotting', text: 'Имплантационное кровотечение', emoji: '🩸' },
                { id: 'dizziness', text: 'Головокружение', emoji: '💫' }
            ];

            // Весовые коэффициенты (важность симптома для вероятности)
            const symptomWeights = {
                missedPeriod: 4.0,
                nausea: 2.7,
                breastTenderness: 2.2,
                fatigue: 1.8,
                frequentUrination: 1.7,
                foodAversions: 2.0,
                moodSwings: 1.3,
                bloating: 1.2,
                spotting: 1.6,
                dizziness: 1.1
            };

            const maxPossibleWeight = Object.values(symptomWeights).reduce((sum, w) => sum + w, 0); 
            // ~19.6

            const container = document.getElementById('symptomsContainer');
            const calculateBtn = document.getElementById('calculateBtn');
            const resetBtn = document.getElementById('resetBtn');
            const resultPanel = document.getElementById('resultPanel');

            // Рендер чекбоксов
            function renderSymptoms() {
                if (!container) return;
                container.innerHTML = '';
                symptomsList.forEach(symptom => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'symptom-item';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = `sym_${symptom.id}`;
                    checkbox.dataset.symptomId = symptom.id;
                    
                    const label = document.createElement('label');
                    label.htmlFor = `sym_${symptom.id}`;
                    label.className = 'symptom-text';
                    // Вставляем эмодзи и текст
                    label.innerHTML = `<span class="symptom-emoji">${symptom.emoji}</span>${symptom.text}`;
                    
                    itemDiv.appendChild(checkbox);
                    itemDiv.appendChild(label);
                    
                    // Клик по всему div переключает чекбокс
                    itemDiv.addEventListener('click', (e) => {
                        // Не переключаем, если кликнули прямо по чекбоксу (чтобы избежать двойного срабатывания)
                        if (e.target.tagName !== 'INPUT') {
                            checkbox.checked = !checkbox.checked;
                            // Вызовем событие change вручную для совместимости
                            const event = new Event('change', { bubbles: true });
                            checkbox.dispatchEvent(event);
                        }
                    });
                    
                    container.appendChild(itemDiv);
                });
            }

            // Получить выбранные ID симптомов
            function getSelectedSymptomIds() {
                const checkboxes = document.querySelectorAll('#symptomsContainer input[type="checkbox"]');
                const selected = [];
                checkboxes.forEach(cb => {
                    if (cb.checked && cb.dataset.symptomId) {
                        selected.push(cb.dataset.symptomId);
                    }
                });
                return selected;
            }

            // Расчет вероятности на основе весов
            function calculateProbability(selectedIds) {
                if (selectedIds.length === 0) return 0;
                
                let totalWeight = 0;
                selectedIds.forEach(id => {
                    if (symptomWeights.hasOwnProperty(id)) {
                        totalWeight += symptomWeights[id];
                    }
                });
                
                // Нормализуем: отношение суммы весов выбранных симптомов к максимально возможному весу
                let rawRatio = totalWeight / maxPossibleWeight;
                
                // Применяем нелинейное масштабирование, чтобы сделать результат более реалистичным:
                // При малом количестве симптомов вероятность не взлетает слишком высоко,
                // а при большом количестве приближается к высоким значениям.
                // Используем сигмоидоподобную кривую или степенную функцию.
                // Здесь: вероятность = (rawRatio ^ 0.75) * 92 + базовый сдвиг, но ограничим.
                // Более плавно: используем усиление важных комбинаций.
                let adjusted = Math.pow(rawRatio, 0.8) * 88; 
                
                // Добавим бонус, если выбрана задержка менструации (ключевой симптом)
                if (selectedIds.includes('missedPeriod')) {
                    adjusted = Math.min(97, adjusted * 1.2 + 5);
                }
                
                // Ограничиваем вероятность от 0 до 97% (никогда не 100%)
                let probability = Math.min(97, Math.max(0, Math.round(adjusted)));
                
                // Минимальная отсечка: если выбрано меньше 2 симптомов и нет задержки, снижаем
                if (selectedIds.length === 1 && !selectedIds.includes('missedPeriod')) {
                    probability = Math.min(probability, 18);
                }
                if (selectedIds.length === 0) probability = 0;
                
                return probability;
            }

            // Интерпретация результата
            function getInterpretation(probability, selectedCount) {
                if (selectedCount === 0) {
                    return { text: 'Не выбрано ни одного симптома.', advice: 'Отметьте признаки, которые вас беспокоят.' };
                }
                if (probability >= 70) {
                    return { 
                        text: `Высокая вероятность беременности (${probability}%).`, 
                        advice: 'Рекомендуется сделать аптечный тест или сдать кровь на ХГЧ.' 
                    };
                } else if (probability >= 40) {
                    return { 
                        text: `Средняя вероятность (${probability}%).`, 
                        advice: 'Симптомы могут указывать на беременность, но также бывают при ПМС. Повторите проверку через пару дней.' 
                    };
                } else if (probability >= 15) {
                    return { 
                        text: `Низкая вероятность (${probability}%).`, 
                        advice: 'Симптомы слабо выражены. Возможно, это цикличные изменения.' 
                    };
                } else {
                    return { 
                        text: `Очень низкая вероятность (${probability}%).`, 
                        advice: 'Симптомы в основном неспецифичны. Но если задержка растёт — обратитесь к врачу.' 
                    };
                }
            }

            // Обновление UI результата
            function updateResult() {
                const selectedIds = getSelectedSymptomIds();
                const probability = calculateProbability(selectedIds);
                const interpretation = getInterpretation(probability, selectedIds.length);
                
                let htmlContent = '';
                if (selectedIds.length === 0) {
                    htmlContent = `<span>🧾</span> ${interpretation.text} <span style="margin-left:auto;">0%</span>`;
                } else {
                    htmlContent = `
                        <span style="font-size:1.8rem;">${probability >= 60 ? '🔴' : (probability >= 25 ? '🟠' : '🟢')}</span>
                        <span style="font-weight:600; flex:1;">${interpretation.text}</span>
                        <span class="probability-badge">${probability}%</span>
                    `;
                }
                
                // Добавляем совет во вторую строку, если есть симптомы
                if (selectedIds.length > 0) {
                    htmlContent += `<div style="width:100%; margin-top:0.5rem; font-size:0.9rem; color:#5e4b44; display:flex; align-items:center; gap:0.3rem;"><span>💡</span> ${interpretation.advice}</div>`;
                }
                
                resultPanel.innerHTML = htmlContent;
                
                // Визуально выделяем, если высокая вероятность
                if (probability >= 60) {
                    resultPanel.classList.add('result-highlight');
                } else {
                    resultPanel.classList.remove('result-highlight');
                }
            }

            // Сброс всех чекбоксов
            function resetAll() {
                const checkboxes = document.querySelectorAll('#symptomsContainer input[type="checkbox"]');
                checkboxes.forEach(cb => { cb.checked = false; });
                updateResult();
            }

            // Привязка событий
            function bindEvents() {
                if (calculateBtn) {
                    calculateBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        updateResult();
                    });
                }
                
                if (resetBtn) {
                    resetBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        resetAll();
                    });
                }
                
                // Автоматический пересчет при изменении любого чекбокса (опционально, но удобно)
                if (container) {
                    container.addEventListener('change', (e) => {
                        if (e.target && e.target.type === 'checkbox') {
                            updateResult();
                        }
                    });
                }
            }

            // Инициализация
            renderSymptoms();
            bindEvents();
            // Начальное состояние результата
            updateResult();
        })();
    </script>
</body>
</html>
